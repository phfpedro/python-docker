services:
  python-pos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-pos
    working_dir: /app
    env_file:
      - .env
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    volumes:
      - ./:/app
    command: python -u ${PYTHON_FILE:-src/main.py}
    stdin_open: true
    tty: true
